<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Comics Agent — 测试台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
  <style>
    /* ─────────────────────────── 全局 ─────────────────────────── */
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22253a;
      --border: #2e3148;
      --text: #e2e8f0;
      --text-muted: #7c85a2;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --user-bubble: #1e3a5f;
      --agent-bubble: #1a1d27;
      --tool-bg: #0d1117;
      --tool-border: #30363d;
      --success: #22c55e;
      --warn: #f59e0b;
      --error: #ef4444;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      font-size: 15px;
      line-height: 1.6;
    }

    /* ─────────────────────────── 布局 ─────────────────────────── */
    #app { display: flex; height: 100dvh; overflow: hidden; }

    /* 侧边栏 */
    #sidebar {
      width: 280px;
      min-width: 280px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 20px 16px;
      gap: 16px;
      overflow-y: auto;
    }
    .sidebar-logo {
      display: flex; align-items: center; gap: 10px;
      padding-bottom: 16px; border-bottom: 1px solid var(--border);
    }
    .sidebar-logo .icon {
      width: 32px; height: 32px; border-radius: 8px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .sidebar-logo h1 { font-size: 15px; font-weight: 600; margin: 0; }
    .sidebar-logo p { font-size: 11px; color: var(--text-muted); margin: 0; }
    .section-label {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 6px;
    }
    .config-group { display: flex; flex-direction: column; gap: 8px; }
    label { font-size: 13px; color: var(--text-muted); margin-bottom: 2px; display: block; }
    select, input[type="text"], textarea {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); border-radius: 8px; padding: 7px 10px; font-size: 13px;
      outline: none; transition: border-color 0.15s;
    }
    select:focus, input:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 60px; font-family: inherit; }
    .btn-clear {
      width: 100%; padding: 8px; background: transparent;
      border: 1px solid var(--border); color: var(--text-muted);
      border-radius: 8px; cursor: pointer; font-size: 13px;
      transition: all 0.15s; margin-top: auto;
    }
    .btn-clear:hover { border-color: var(--error); color: var(--error); }

    /* 主区域 */
    #main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
    #topbar {
      padding: 14px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      background: var(--surface); flex-shrink: 0;
    }
    .topbar-status { display: flex; align-items: center; gap: 8px; font-size: 13px; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--success);
      box-shadow: 0 0 6px var(--success);
    }
    .status-dot.loading { background: var(--warn); box-shadow: 0 0 6px var(--warn); animation: pulse 1s infinite; }
    .status-dot.error { background: var(--error); box-shadow: none; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .token-badge {
      font-size: 12px; color: var(--text-muted); background: var(--surface2);
      padding: 3px 10px; border-radius: 20px; border: 1px solid var(--border);
    }

    /* 消息列表 */
    #messages {
      flex: 1; overflow-y: auto; padding: 20px;
      display: flex; flex-direction: column; gap: 20px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* 消息气泡 */
    .msg-row { display: flex; gap: 12px; max-width: 900px; }
    .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg-row.agent { align-self: flex-start; }
    .avatar {
      width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700;
    }
    .avatar.user-av { background: linear-gradient(135deg, #2563eb, #7c3aed); }
    .avatar.agent-av { background: linear-gradient(135deg, #6366f1, #a855f7); }
    .bubble {
      padding: 12px 16px; border-radius: 12px; max-width: 760px;
      font-size: 14.5px; line-height: 1.7; word-break: break-word;
    }
    .msg-row.user .bubble {
      background: var(--user-bubble); border-bottom-right-radius: 4px;
    }
    .msg-row.agent .bubble {
      background: var(--agent-bubble); border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .bubble-thinking { opacity: 0.6; font-style: italic; font-size: 13px; }

    /* Markdown 渲染 */
    .bubble h1,.bubble h2,.bubble h3,.bubble h4 { font-weight: 600; line-height: 1.4; margin: 0.8em 0 0.4em; }
    .bubble h1 { font-size: 20px; } .bubble h2 { font-size: 17px; } .bubble h3 { font-size: 15px; }
    .bubble p { margin: 0 0 0.6em; } .bubble p:last-child { margin: 0; }
    .bubble ul,.bubble ol { padding-left: 20px; margin: 0.4em 0; }
    .bubble li { margin: 0.15em 0; }
    .bubble table { border-collapse: collapse; width: 100%; margin: 0.6em 0; font-size: 13px; }
    .bubble th,.bubble td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
    .bubble th { background: var(--surface2); }
    .bubble a { color: var(--accent-hover); text-decoration: underline; }
    .bubble blockquote {
      border-left: 3px solid var(--accent); margin: 0.5em 0;
      padding: 4px 12px; background: var(--surface2); border-radius: 0 6px 6px 0;
    }

    /* 代码块 */
    .code-wrap { position: relative; margin: 0.6em 0; }
    .code-header {
      display: flex; align-items: center; justify-content: space-between;
      background: #161b22; border: 1px solid var(--tool-border); border-bottom: none;
      border-radius: 8px 8px 0 0; padding: 6px 12px; font-size: 12px; color: var(--text-muted);
    }
    .code-wrap pre {
      margin: 0; border-radius: 0 0 8px 8px;
      border: 1px solid var(--tool-border); overflow-x: auto;
    }
    .code-wrap pre code { font-size: 13px; }
    .bubble code:not(pre code) {
      background: var(--surface2); padding: 1px 5px; border-radius: 4px;
      font-size: 13px; font-family: 'JetBrains Mono', 'Fira Code', monospace;
    }
    .btn-copy {
      background: transparent; border: none; cursor: pointer;
      color: var(--text-muted); padding: 2px 6px; border-radius: 4px;
      font-size: 11px; transition: color 0.15s;
    }
    .btn-copy:hover { color: var(--text); }
    .btn-copy.copied { color: var(--success); }

    /* 工具调用卡片 */
    .tool-card {
      border: 1px solid var(--tool-border); border-radius: 8px;
      background: var(--tool-bg); overflow: hidden; margin: 6px 0;
      font-size: 13px;
    }
    .tool-header {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px; background: #161b22; cursor: pointer;
      user-select: none;
    }
    .tool-icon { font-size: 14px; }
    .tool-name { font-weight: 600; color: #79c0ff; }
    .tool-status {
      margin-left: auto; font-size: 11px; padding: 2px 7px; border-radius: 10px;
    }
    .tool-status.running { background: rgba(245,158,11,0.15); color: var(--warn); }
    .tool-status.done { background: rgba(34,197,94,0.15); color: var(--success); }
    .tool-status.err { background: rgba(239,68,68,0.15); color: var(--error); }
    .tool-chevron { color: var(--text-muted); transition: transform 0.2s; font-size: 11px; }
    .tool-card.open .tool-chevron { transform: rotate(90deg); }
    .tool-body { display: none; padding: 10px 12px; border-top: 1px solid var(--tool-border); }
    .tool-card.open .tool-body { display: block; }
    .tool-section-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; font-weight: 500; }
    .tool-json {
      background: #0d1117; border: 1px solid var(--border); border-radius: 6px;
      padding: 8px; font-family: 'JetBrains Mono', monospace; font-size: 12px;
      overflow-x: auto; white-space: pre-wrap; word-break: break-all; color: #c9d1d9;
    }

    /* 图片展示 */
    .bubble img.generated-img {
      max-width: 360px; border-radius: 8px; margin: 6px 0; display: block;
      border: 1px solid var(--border); cursor: pointer;
    }
    .bubble img.generated-img:hover { opacity: 0.9; }

    /* 输入区 */
    #inputbar {
      padding: 14px 20px; border-top: 1px solid var(--border);
      background: var(--surface); flex-shrink: 0;
    }
    .input-wrap {
      display: flex; align-items: flex-end; gap: 10px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px; padding: 8px 12px;
      transition: border-color 0.15s;
    }
    .input-wrap:focus-within { border-color: var(--accent); }
    #userInput {
      flex: 1; background: transparent; border: none; color: var(--text);
      font-size: 14px; line-height: 1.6; resize: none; outline: none;
      max-height: 160px; overflow-y: auto; min-height: 24px;
      font-family: inherit;
    }
    #userInput::placeholder { color: var(--text-muted); }
    .send-btn {
      width: 36px; height: 36px; border-radius: 8px; border: none; cursor: pointer;
      background: var(--accent); color: #fff; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0; transition: background 0.15s;
    }
    .send-btn:hover:not(:disabled) { background: var(--accent-hover); }
    .send-btn:disabled { background: var(--border); cursor: not-allowed; }
    .send-btn svg { width: 16px; height: 16px; }
    .input-hint {
      font-size: 12px; color: var(--text-muted); text-align: center;
      margin-top: 8px;
    }

    /* 空状态 */
    #empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; gap: 12px; color: var(--text-muted); text-align: center;
    }
    .empty-icon { font-size: 48px; }
    .empty-title { font-size: 18px; font-weight: 600; color: var(--text); }
    .empty-sub { font-size: 14px; max-width: 380px; }
    .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 8px; }
    .sug-btn {
      padding: 7px 14px; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 20px; color: var(--text); font-size: 13px; cursor: pointer;
      transition: all 0.15s;
    }
    .sug-btn:hover { border-color: var(--accent); color: var(--accent-hover); }

    /* 流式光标 */
    .typing-cursor::after {
      content: '▋'; animation: blink 0.8s step-end infinite; color: var(--accent);
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* 滚动到底按钮 */
    #scroll-btn {
      position: absolute; bottom: 100px; right: 30px;
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text-muted); cursor: pointer; display: none;
      align-items: center; justify-content: center; font-size: 16px;
      transition: all 0.15s; z-index: 10;
    }
    #scroll-btn:hover { border-color: var(--accent); color: var(--accent); }
    #scroll-btn.visible { display: flex; }

    /* 步骤指示器 */
    .step-indicator {
      font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 4px;
      padding: 4px 0 8px 44px;
    }
    .step-dot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
      animation: stepPulse 0.6s ease-in-out;
    }
    @keyframes stepPulse { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

    /* 响应式 */
    @media (max-width: 768px) {
      #sidebar { display: none; }
      .msg-row { max-width: 100%; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ═══ 侧边栏 ═══ -->
  <aside id="sidebar">
    <div class="sidebar-logo">
      <div class="icon">🤖</div>
      <div>
        <h1>AI Comics Agent</h1>
        <p>v0.1.0 · 测试台</p>
      </div>
    </div>

    <div class="config-group">
      <p class="section-label">模型设置</p>
      <div>
        <label>模型</label>
        <select id="modelSelect">
          <option value="deepseek-chat">DeepSeek Chat</option>
          <option value="deepseek-reasoner">DeepSeek R1 (推理)</option>
        </select>
      </div>
      <div>
        <label>工具集</label>
        <select id="toolsetSelect">
          <option value="all">全部工具</option>
          <option value="web">网络工具（搜索 + 抓取）</option>
          <option value="code">代码工具</option>
          <option value="comics">AI Comics 平台</option>
        </select>
      </div>
      <div>
        <label>最大步数</label>
        <select id="maxSteps">
          <option value="10">10</option>
          <option value="20" selected>20</option>
          <option value="30">30</option>
          <option value="50">50</option>
        </select>
      </div>
    </div>

    <div class="config-group">
      <p class="section-label">平台上下文（可选）</p>
      <div>
        <label>项目 ID</label>
        <input type="text" id="projectId" placeholder="ai-comics 项目 ID" />
      </div>
      <div>
        <label>项目名称</label>
        <input type="text" id="projectName" placeholder="仅用于提示词" />
      </div>
    </div>

    <div class="config-group">
      <p class="section-label">自定义系统提示词</p>
      <textarea id="customSystem" placeholder="留空使用默认提示词…" rows="4"></textarea>
    </div>

    <button class="btn-clear" onclick="clearChat()">🗑 清空对话</button>
  </aside>

  <!-- ═══ 主区域 ═══ -->
  <div id="main">
    <!-- 顶栏 -->
    <div id="topbar">
      <div class="topbar-status">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">已连接</span>
      </div>
      <div id="tokenBadge" class="token-badge" style="display:none"></div>
    </div>

    <!-- 消息列表 -->
    <div id="messages" onscroll="handleScroll()">
      <div id="empty-state">
        <div class="empty-icon">🤖</div>
        <div class="empty-title">AI Comics Agent 测试台</div>
        <div class="empty-sub">支持写代码、生成图像、搜索网页、操作 ai-comics 平台等</div>
        <div class="suggestions">
          <button class="sug-btn" onclick="setInput('用 Vue3 + Tailwind 写一个响应式导航栏组件')">✏️ 写 Vue 组件</button>
          <button class="sug-btn" onclick="setInput('搜索 Vercel AI SDK 最新版本有哪些新特性')">🔍 搜索信息</button>
          <button class="sug-btn" onclick="setInput('抓取 https://vercel.com/blog 并总结最近的文章')">🌐 抓取网页</button>
          <button class="sug-btn" onclick="setInput('生成一张赛博朋克风格的城市夜景插图')">🎨 生成图片</button>
          <button class="sug-btn" onclick="setInput('列出我的所有 ai-comics 项目')">📂 查看项目</button>
          <button class="sug-btn" onclick="setInput('分析这段代码的安全性：const exec = (cmd) => eval(cmd)')">🔍 分析代码</button>
        </div>
      </div>
    </div>

    <!-- 滚动到底按钮 -->
    <button id="scroll-btn" onclick="scrollToBottom()" title="滚动到底部">↓</button>

    <!-- 输入区 -->
    <div id="inputbar">
      <div class="input-wrap">
        <textarea
          id="userInput"
          rows="1"
          placeholder="输入指令…（Shift+Enter 换行，Enter 发送）"
          onkeydown="handleKeydown(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="发送 (Enter)">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
      <div class="input-hint">Enter 发送 · Shift+Enter 换行 · 工具调用为多步执行</div>
    </div>
  </div>

</div>

<script>
// ───────────────────────────── 配置 ─────────────────────────────
const API_BASE = window.location.origin

// ───────────────────────────── 状态 ─────────────────────────────
let messages = []          // { role, content, toolCalls, id }
let isStreaming = false
let totalTokens = 0

// ───────────────────────────── 工具函数 ─────────────────────────
const $ = (id) => document.getElementById(id)
const uid = () => Math.random().toString(36).slice(2, 10)

function setStatus(state) {
  const dot = $('statusDot')
  const text = $('statusText')
  dot.className = 'status-dot' + (state === 'loading' ? ' loading' : state === 'error' ? ' error' : '')
  text.textContent = { idle: '已连接', loading: 'Agent 执行中…', error: '连接异常' }[state] ?? state
}

function setInput(text) {
  $('userInput').value = text
  autoResize($('userInput'))
  $('userInput').focus()
}

function autoResize(el) {
  el.style.height = 'auto'
  el.style.height = Math.min(el.scrollHeight, 160) + 'px'
}

function scrollToBottom() {
  const el = $('messages')
  el.scrollTop = el.scrollHeight
}

function handleScroll() {
  const el = $('messages')
  const btn = $('scroll-btn')
  const atBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 60
  btn.classList.toggle('visible', !atBottom)
}

function clearChat() {
  if (messages.length === 0) return
  if (!confirm('确认清空对话？')) return
  messages = []
  totalTokens = 0
  $('tokenBadge').style.display = 'none'
  $('messages').innerHTML = `<div id="empty-state">
    <div class="empty-icon">🤖</div>
    <div class="empty-title">AI Comics Agent 测试台</div>
    <div class="empty-sub">支持写代码、生成图像、搜索网页、操作 ai-comics 平台等</div>
    <div class="suggestions">
      <button class="sug-btn" onclick="setInput('用 Vue3 + Tailwind 写一个响应式导航栏组件')">✏️ 写 Vue 组件</button>
      <button class="sug-btn" onclick="setInput('搜索 Vercel AI SDK 最新版本有哪些新特性')">🔍 搜索信息</button>
      <button class="sug-btn" onclick="setInput('抓取 https://vercel.com/blog 并总结最近的文章')">🌐 抓取网页</button>
      <button class="sug-btn" onclick="setInput('生成一张赛博朋克风格的城市夜景插图')">🎨 生成图片</button>
      <button class="sug-btn" onclick="setInput('列出我的所有 ai-comics 项目')">📂 查看项目</button>
      <button class="sug-btn" onclick="setInput('分析这段代码的安全性：const exec = (cmd) => eval(cmd)')">🔍 分析代码</button>
    </div>
  </div>`
}

function handleKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault()
    sendMessage()
  }
}

// ───────────────────────────── 渲染工具 ──────────────────────────

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
}

function renderMarkdown(text) {
  if (!text) return ''
  // 配置 marked：代码块添加 header + copy 按钮
  const renderer = new marked.Renderer()
  renderer.code = (code, lang) => {
    const language = (lang || 'text').trim()
    const highlighted = (() => {
      try {
        return hljs.highlight(code, { language }).value
      } catch {
        return escapeHtml(code)
      }
    })()
    const id = uid()
    return `<div class="code-wrap">
      <div class="code-header">
        <span>${escapeHtml(language)}</span>
        <button class="btn-copy" onclick="copyCode('${id}', this)">复制</button>
      </div>
      <pre><code id="code-${id}" class="hljs language-${escapeHtml(language)}">${highlighted}</code></pre>
    </div>`
  }
  marked.setOptions({ renderer, breaks: true, gfm: true })
  return marked.parse(text)
}

function copyCode(id, btn) {
  const code = document.getElementById('code-' + id)?.innerText ?? ''
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = '已复制 ✓'
    btn.classList.add('copied')
    setTimeout(() => { btn.textContent = '复制'; btn.classList.remove('copied') }, 1800)
  })
}

function toolIcon(name) {
  const m = {
    fetchWebpage: '🌐', searchWeb: '🔍', generateImage: '🎨',
    saveCode: '💾', explainCode: '🔎',
    listProjects: '📂', getProjectDetail: '📄', listFragments: '🎬',
    createFragment: '➕', triggerFragmentImage: '⚡', listMaterials: '🖼️',
  }
  return m[name] ?? '🔧'
}

function renderToolCard(tc) {
  const icon = toolIcon(tc.toolName)
  let statusHtml = `<span class="tool-status running">执行中…</span>`
  let bodyHtml = ''
  let jsonArgs = ''
  try { jsonArgs = JSON.stringify(tc.args, null, 2) } catch { jsonArgs = String(tc.args) }

  if (tc.result !== undefined) {
    let jsonResult = ''
    try { jsonResult = JSON.stringify(tc.result, null, 2) } catch { jsonResult = String(tc.result) }
    const isError = tc.result?.error
    statusHtml = isError
      ? `<span class="tool-status err">失败</span>`
      : `<span class="tool-status done">完成</span>`

    // 如果结果包含图片 URL，直接展示
    const urls = tc.result?.urls ?? []
    const imgHTML = urls.map(u =>
      u.startsWith('data:') || u.startsWith('http')
        ? `<img src="${escapeHtml(u)}" class="generated-img" alt="生成图片" onclick="window.open(this.src)" />`
        : ''
    ).join('')

    bodyHtml = `
      <div class="tool-section-label">入参</div>
      <div class="tool-json">${escapeHtml(jsonArgs)}</div>
      <div class="tool-section-label" style="margin-top:8px">结果</div>
      ${imgHTML}
      <div class="tool-json">${escapeHtml(jsonResult)}</div>
    `
  } else {
    bodyHtml = `
      <div class="tool-section-label">入参</div>
      <div class="tool-json">${escapeHtml(jsonArgs)}</div>
    `
  }

  const id = 'tc_' + tc.toolCallId
  return `<div class="tool-card" id="${id}">
    <div class="tool-header" onclick="toggleTool('${id}')">
      <span class="tool-icon">${icon}</span>
      <span class="tool-name">${escapeHtml(tc.toolName)}</span>
      ${statusHtml}
      <span class="tool-chevron">▶</span>
    </div>
    <div class="tool-body">${bodyHtml}</div>
  </div>`
}

function toggleTool(id) {
  document.getElementById(id)?.classList.toggle('open')
}

// ───────────────────────────── DOM 消息管理 ───────────────────────

function removeEmptyState() {
  $('empty-state')?.remove()
}

function appendUserBubble(text) {
  removeEmptyState()
  const id = 'msg_' + uid()
  const row = document.createElement('div')
  row.id = id
  row.className = 'msg-row user'
  row.innerHTML = `
    <div class="avatar user-av">U</div>
    <div class="bubble">${escapeHtml(text).replace(/\n/g, '<br>')}</div>
  `
  $('messages').appendChild(row)
  scrollToBottom()
  return id
}

function appendAgentContainer() {
  const id = 'msg_' + uid()
  const row = document.createElement('div')
  row.className = 'msg-row agent'
  row.id = id
  row.innerHTML = `
    <div class="avatar agent-av">AI</div>
    <div class="bubble" id="${id}_bubble">
      <span class="bubble-thinking typing-cursor">正在思考</span>
    </div>
  `
  $('messages').appendChild(row)
  scrollToBottom()
  return id
}

function updateAgentBubble(id, htmlContent, isStreaming) {
  const bubble = document.getElementById(id + '_bubble')
  if (!bubble) return
  bubble.innerHTML = htmlContent + (isStreaming ? '<span class="typing-cursor"></span>' : '')
}

function appendStepIndicator(containerId, step) {
  const indicator = document.createElement('div')
  indicator.className = 'step-indicator'
  indicator.innerHTML = `<span class="step-dot"></span> Agent 步骤 ${step}`
  const container = document.getElementById(containerId)
  if (container) container.after(indicator)
  scrollToBottom()
}

// ───────────────────────────── Vercel AI SDK Stream Parser ───────

/**
 * 解析 Vercel AI SDK Data Stream Protocol
 * 格式：每行 `<type>:<jsonValue>\n`
 * 0 = 文本 delta, 2 = tool call chunks, 9 = tool call start,
 * a = tool result, d = finish/usage
 */
function parseDataStreamLine(line) {
  const colon = line.indexOf(':')
  if (colon === -1) return null
  const type = line.slice(0, colon)
  let value
  try { value = JSON.parse(line.slice(colon + 1)) } catch { return null }
  return { type, value }
}

// ───────────────────────────── 发送消息 ──────────────────────────

async function sendMessage() {
  const input = $('userInput')
  const text = input.value.trim()
  if (!text || isStreaming) return

  // 读取配置
  const toolset = $('toolsetSelect').value
  const maxSteps = parseInt($('maxSteps').value)
  const projectId = $('projectId').value.trim()
  const projectName = $('projectName').value.trim()
  const systemPrompt = $('customSystem').value.trim() || undefined

  // 清空输入框
  input.value = ''
  autoResize(input)

  // 构建 messages
  messages.push({ role: 'user', content: text })
  appendUserBubble(text)

  // 创建 Agent 消息容器
  const agentMsgId = appendAgentContainer()

  isStreaming = true
  $('sendBtn').disabled = true
  setStatus('loading')

  // 流式状态
  let currentText = ''
  let toolCalls = []        // { toolCallId, toolName, argsStr, result }
  let currentStep = 0

  try {
    const body = {
      messages: messages.map(m => ({ role: m.role, content: m.content })),
      toolset,
      maxSteps,
      ...(systemPrompt ? { systemPrompt } : {}),
      ...(projectId ? { projectContext: { projectId, projectName: projectName || undefined } } : {}),
    }

    const res = await fetch(`${API_BASE}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    })

    if (!res.ok) {
      const errText = await res.text()
      throw new Error(`HTTP ${res.status}: ${errText}`)
    }

    const reader = res.body.getReader()
    const decoder = new TextDecoder()
    let buffer = ''

    while (true) {
      const { done, value } = await reader.read()
      if (done) break
      buffer += decoder.decode(value, { stream: true })

      // 按行处理
      const lines = buffer.split('\n')
      buffer = lines.pop() ?? ''

      for (const raw of lines) {
        const line = raw.trim()
        if (!line) continue
        const parsed = parseDataStreamLine(line)
        if (!parsed) continue
        const { type, value } = parsed

        if (type === '0') {
          // 文本 delta
          currentText += value
          updateAgentBubble(agentMsgId, renderMarkdown(currentText), true)
          scrollToBottom()

        } else if (type === '9') {
          // Tool call start (includes toolCallId, toolName, argsTextDelta)
          // type 9 = tool call stream start chunk
          // Each 9: chunk is array of tool call parts
          const parts = Array.isArray(value) ? value : [value]
          for (const part of parts) {
            let tc = toolCalls.find(t => t.toolCallId === part.toolCallId)
            if (!tc) {
              tc = { toolCallId: part.toolCallId, toolName: part.toolName ?? '', argsStr: '' }
              toolCalls.push(tc)
            }
            if (part.argsTextDelta) tc.argsStr += part.argsTextDelta
            if (part.toolName) tc.toolName = part.toolName
          }
          refreshToolCalls(agentMsgId, currentText, toolCalls)

        } else if (type === '2') {
          // Tool call complete chunks (argsTextDelta updates)
          const parts = Array.isArray(value) ? value : [value]
          for (const part of parts) {
            let tc = toolCalls.find(t => t.toolCallId === part.toolCallId)
            if (!tc) {
              tc = { toolCallId: part.toolCallId, toolName: part.toolName ?? '', argsStr: '' }
              toolCalls.push(tc)
            }
            if (part.argsTextDelta) tc.argsStr += part.argsTextDelta
            if (part.toolName && !tc.toolName) tc.toolName = part.toolName
          }
          refreshToolCalls(agentMsgId, currentText, toolCalls)

        } else if (type === 'a') {
          // Tool result
          const parts = Array.isArray(value) ? value : [value]
          for (const part of parts) {
            const tc = toolCalls.find(t => t.toolCallId === part.toolCallId)
            if (tc) {
              tc.result = part.result
              currentStep++
            }
          }
          refreshToolCalls(agentMsgId, currentText, toolCalls)

        } else if (type === 'e') {
          // step finish
          if (value?.finishReason === 'tool-calls') {
            currentStep++
            appendStepIndicator(agentMsgId, currentStep)
          }

        } else if (type === 'd') {
          // Stream done + usage
          const usage = value?.usage
          if (usage) {
            totalTokens += (usage.totalTokens ?? 0)
            const badge = $('tokenBadge')
            badge.style.display = 'block'
            badge.textContent = `📊 ${totalTokens.toLocaleString()} tokens`
          }
        }
      }
    }

    // 流结束，最终渲染
    updateAgentBubble(agentMsgId, renderMarkdown(currentText) + renderAllToolCards(toolCalls), false)

    // 保存 assistant message
    messages.push({ role: 'assistant', content: currentText })

  } catch (err) {
    const errMsg = err?.message ?? String(err)
    updateAgentBubble(agentMsgId,
      `<span style="color:var(--error)">❌ 请求失败：${escapeHtml(errMsg)}</span>`, false)
    setStatus('error')
  } finally {
    isStreaming = false
    $('sendBtn').disabled = false
    setStatus('idle')
    scrollToBottom()
  }
}

function renderAllToolCards(toolCalls) {
  if (toolCalls.length === 0) return ''
  return '<div style="margin-top:10px">' + toolCalls.map(renderToolCard).join('') + '</div>'
}

/**
 * 刷新 Agent 气泡中的工具调用卡片（流式更新中）
 */
function refreshToolCalls(agentMsgId, currentText, toolCalls) {
  const html = renderMarkdown(currentText) + renderAllToolCards(toolCalls)
  updateAgentBubble(agentMsgId, html, true)
  scrollToBottom()
}

// ───────────────────────────── 初始化 ────────────────────────────

// 检查后端连通性
fetch(`${API_BASE}/health`)
  .then(r => r.json())
  .then(() => setStatus('idle'))
  .catch(() => setStatus('error'))

// 从 URL 参数初始化项目配置（便于从平台跳转）
const params = new URLSearchParams(location.search)
if (params.get('projectId')) $('projectId').value = params.get('projectId')
if (params.get('projectName')) $('projectName').value = params.get('projectName')
</script>
</body>
